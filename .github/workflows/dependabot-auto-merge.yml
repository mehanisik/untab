name: Dependabot auto-merge

# Auto-merges Dependabot PRs that bump dependencies by minor or patch only,
# once required status checks pass. Major bumps are skipped — those still
# need a human review.
#
# Requirements (one-time, in repo Settings):
#   - Settings → General → Pull Requests → "Allow auto-merge" enabled.
#   - Settings → Code & automation → Actions → General → "Allow GitHub
#     Actions to create and approve pull requests" enabled.
#   - Recommended: branch protection on main requiring CI status checks
#     so auto-merge waits for green before merging.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for minor/patch
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
