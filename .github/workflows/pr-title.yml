name: PR Title

# Enforces Conventional Commits on PR titles (feat:, fix:, chore:, ...).
# Squash-merging uses the PR title as the commit subject, so a valid title
# keeps main's history clean and unlocks future semver/release automation.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

# pull_request_target runs in the base-repo context; only the title is read.
permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Match the conventional-commit types used across this repo's history.
          types: |
            feat
            fix
            refactor
            perf
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Subject should not start uppercase / end with a period.
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The subject "{subject}" is invalid: it must start lower-case and
            must not end with a period.
